<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parts of Speech Test</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#0d0d0d;
    color:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    padding:20px;
}

.card{
    width:100%;
    max-width:650px;
    background:#171717;
    border:1px solid #2b2b2b;
    border-radius:18px;
    padding:40px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:45px;
}

.questionNo{
    color:#8d8d8d;
    font-size:14px;
    letter-spacing:1px;
}

.timer{
    width:58px;
    height:58px;
    border-radius:50%;
    border:2px solid #555;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    font-weight:700;
}

.word{
    font-size:44px;
    font-weight:700;
    margin-bottom:10px;
}

.subtitle{
    color:#8d8d8d;
    margin-bottom:35px;
}

select{
    width:100%;
    padding:16px;
    background:#111;
    color:white;
    border:1px solid #333;
    border-radius:10px;
    font-size:17px;
    outline:none;
}

select:focus{
    border-color:#888;
}

button{
    width:100%;
    margin-top:28px;
    padding:16px;
    background:white;
    color:black;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    opacity:.9;
}

.result{
    text-align:center;
}

.result h1{
    font-size:60px;
    margin:25px 0;
}

.result p{
    color:#999;
}

</style>

</head>
<body>

<div class="card">

<div class="header">
<div class="questionNo">
QUESTION <span id="qno">1</span>/10
</div>

<div class="timer">
<span id="timer">10</span>
</div>
</div>

<div class="word" id="word"></div>

<div class="subtitle">
Choose the correct part of speech.
</div>

<select id="answer">

<option value="">Select an answer</option>

<option>Noun</option>

<option>Verb</option>

<option>Adjective</option>

<option>Adverb</option>

</select>

<button onclick="nextQuestion()">
Next
</button>

</div>

<script>

const questions=[

{word:"Teacher",answer:"Noun"},
{word:"Beautiful",answer:"Adjective"},
{word:"Run",answer:"Verb"},
{word:"Quickly",answer:"Adverb"},
{word:"Mountain",answer:"Noun"},
{word:"Happy",answer:"Adjective"},
{word:"Jump",answer:"Verb"},
{word:"Slowly",answer:"Adverb"},
{word:"Book",answer:"Noun"},
{word:"Bright",answer:"Adjective"}

];

let current=0;
let score=0;
let seconds=10;
let interval;

function loadQuestion(){

document.getElementById("qno").innerHTML=current+1;
document.getElementById("word").innerHTML=questions[current].word;
document.getElementById("answer").value="";

seconds=10;
document.getElementById("timer").innerHTML=seconds;

clearInterval(interval);

interval=setInterval(()=>{

seconds--;

document.getElementById("timer").innerHTML=seconds;

if(seconds<=0){

clearInterval(interval);

nextQuestion(true);

}

},1000);

}

function nextQuestion(timeout=false){

clearInterval(interval);

const selected=document.getElementById("answer").value;

if(!timeout && selected===questions[current].answer){

score++;

}

current++;

if(current>=questions.length){

document.querySelector(".card").innerHTML=`

<div class="result">

<p>Your Score</p>

<h1>${score}/10</h1>

<button onclick="location.reload()">
Try Again
</button>

</div>

`;

return;

}

loadQuestion();

}

loadQuestion();

</script>

</body>
</html>
