<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parts of Speech Test</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Georgia, "Times New Roman", serif;
    background:#0f0f0f;
    color:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:24px;
}

.card{
    width:100%;
    max-width:760px;
    background:#171717;
    border:1px solid #2c2c2c;
    border-radius:18px;
    padding:50px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:50px;
}

.question-number{
    color:#9f9f9f;
    font-size:15px;
    letter-spacing:2px;
    text-transform:uppercase;
}

.timer{
    width:58px;
    height:58px;
    border:2px solid #4a4a4a;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    font-weight:bold;
}

.prompt{
    font-size:21px;
    color:#bdbdbd;
    line-height:1.6;
    margin-bottom:20px;
}

.sentence{
    font-size:42px;
    line-height:1.5;
    margin-bottom:45px;
}

.sentence strong{
    color:#ffffff;
    text-decoration:underline;
    text-decoration-thickness:2px;
    text-underline-offset:8px;
}

select{
    width:100%;
    padding:16px;
    background:#101010;
    color:white;
    border:1px solid #3b3b3b;
    border-radius:10px;
    font-family:Georgia, serif;
    font-size:18px;
    outline:none;
}

select:focus{
    border-color:#8b8b8b;
}

button{
    width:100%;
    margin-top:28px;
    padding:16px;
    background:#ffffff;
    color:#000;
    border:none;
    border-radius:10px;
    font-family:Georgia, serif;
    font-size:18px;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    opacity:.92;
}

.result{
    text-align:center;
}

.result h2{
    font-size:34px;
    margin-bottom:15px;
}

.result h1{
    font-size:68px;
    margin:20px 0;
}

.result p{
    color:#aaaaaa;
    font-size:18px;
}
</style>
</head>

<body>

<div class="card">

<div class="header">
<div class="question-number">
Question <span id="qNo">1</span> of 10
</div>

<div class="timer">
<span id="timer">10</span>
</div>
</div>

<div class="prompt">
Identify the part of speech of the highlighted word.
</div>

<div class="sentence" id="sentence"></div>

<select id="answer">
<option value="">Select an answer</option>
<option>Noun</option>
<option>Verb</option>
<option>Adjective</option>
<option>Adverb</option>
</select>

<button onclick="submitAnswer()">Next</button>

</div>

<script>

const questions = [

{
sentence:'He is a <strong>teacher</strong>.',
answer:'Noun'
},

{
sentence:'She can <strong>sing</strong> beautifully.',
answer:'Verb'
},

{
sentence:'The <strong>beautiful</strong> flower bloomed.',
answer:'Adjective'
},

{
sentence:'The baby slept <strong>peacefully</strong>.',
answer:'Adverb'
},

{
sentence:'They bought a <strong>car</strong> yesterday.',
answer:'Noun'
},

{
sentence:'Birds <strong>fly</strong> high in the sky.',
answer:'Verb'
},

{
sentence:'It was a <strong>difficult</strong> question.',
answer:'Adjective'
},

{
sentence:'She answered <strong>politely</strong>.',
answer:'Adverb'
},

{
sentence:'The <strong>doctor</strong> arrived early.',
answer:'Noun'
},

{
sentence:'The children <strong>laughed</strong> loudly.',
answer:'Verb'
}

];

let current = 0;
let score = 0;
let seconds = 10;
let timer;

function loadQuestion(){

document.getElementById("qNo").textContent = current + 1;

document.getElementById("sentence").innerHTML =
questions[current].sentence;

document.getElementById("answer").value="";

seconds = 10;

document.getElementById("timer").textContent = seconds;

clearInterval(timer);

timer = setInterval(function(){

seconds--;

document.getElementById("timer").textContent = seconds;

if(seconds<=0){

clearInterval(timer);

submitAnswer(true);

}

},1000);

}

function submitAnswer(timeout=false){

clearInterval(timer);

const selected =
document.getElementById("answer").value;

if(!timeout){

if(selected===questions[current].answer){

score++;

}

}

current++;

if(current>=questions.length){

document.querySelector(".card").innerHTML=`

<div class="result">

<h2>Test Completed</h2>

<p>Your Score</p>

<h1>${score}/10</h1>

<button onclick="location.reload()">
Try Again
</button>

</div>

`;

return;

}

loadQuestion();

}

loadQuestion();

</script>

</body>
</html>
